<h2>Customers</h2>&nbsp;<a routerLink="/customers/new" class="btn btn-success">Nuevo Customer</a>
<div class="table-responsive">
    <table class="table table-striped table-sm">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let customer of resultsPage.content; index as i">
                <td>{{ i + 1 }}</td>
                <td>{{ customer.name }}</td>
                <td>
                    <a routerLink="/customers/{{customer.id}}"><i class="fa fa-pencil"></i></a>   <!-- borrar {{customer.id}} ??-->
                    <a (click)="remove(customer.id)" [routerLink]=""><i class="fa fa-remove"></i></a> <!-- routerLink?? -->
                </td>
            </tr>
        </tbody>
        <tfoot>
            <app-pagination
                [totalPages]="resultsPage.totalPages"
                [currentPage]="currentPage"
                (pageChangeRequested)="onPageChangeRequested($event)"
                [number]="resultsPage.number"
                [hidden]="resultsPage.numberOfElements < 1"
            >
            </app-pagination>
        </tfoot>
    </table>
</div>
