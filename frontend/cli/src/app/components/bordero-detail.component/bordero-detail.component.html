<div *ngIf="bordero">
    <h2>
        {{
            bordero && bordero.id ? "Bordero.id" : "Nuevo Bordero"
        }}
    </h2>
    <form #form="ngForm">
        <div class="form-group inline">
            <label for="date">Fecha:</label>
            <ngb-datepicker name="date" [(ngModel)]="borderoDate"></ngb-datepicker>
        </div>
        <div class="form-group">
            <label for="customer">Cliente:</label>
            <br/>
            <input
                [(ngModel)] = "bordero.customer"
                name="customer"
                placeholder="Cliente"
                class="form-control"
                required
                [ngbTypeahead]
                [editable]="false"
                [resultFormatter] = "resulFormat"
                [insputFormatter] = "inputFormat"
            >
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-sm">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Obra</th>
                        <th>Audiencia</th>
                        <th>
                            <button (click)="addPerformance" class="btn btn-success">
                                Agregar
                            </button>
                        </th>
                    </tr>
                </thead>
            </table>
        </div>
    </form>
</div>
